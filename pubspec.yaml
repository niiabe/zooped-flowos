name: zooped
description: "Zoo Pedigree - Dog Pedigree Tracking App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # UI & Design
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  
  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  
  # Navigation
  go_router: ^14.8.1
  
  # Database (Drift over SQLite)
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  
  # File Operations
  image_picker: ^1.1.2
  share_plus: ^10.1.4
  csv: ^6.0.0
  
  # PDF Generation & Printing
  pdf: ^3.11.2
  printing: ^5.13.4
  
  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0
  
  # Code Generation
  build_runner: ^2.4.14
  drift_dev: ^2.22.1
  riverpod_generator: ^2.6.3
  
  # App Icon & Splash Screen Generation
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3
  
  # Testing
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/

# App Icon Configuration (Android Only)
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo.png"
  adaptive_icon_foreground: "assets/images/logo.png"
  adaptive_icon_background: "#FFFFFF"

# Splash Screen Configuration (Android Only)
flutter_native_splash:
  color: "#FFFFFF"
  image: assets/images/logo_splash.png
  android_12:
    color: "#FFFFFF"
    image: assets/images/logo_splash.png
  android: true
  ios: false
  fullscreen: true
